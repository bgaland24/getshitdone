{% extends "base.html" %}
{% block title %}Accueil — GetShitDone{% endblock %}

{% block content %}
<div class="space-y-8">
    <div>
        <h1 class="text-2xl font-bold">Bonjour</h1>
        <p class="text-gray-500 text-sm mt-1">{{ user.email }}</p>
    </div>

    <div class="space-y-3">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Modules</h2>

        <!-- Module : Suivi de tâches -->
        <a href="{{ url_for('tasks.index') }}"
           class="flex items-center gap-4 p-4 bg-white rounded-xl border border-gray-200
                  hover:border-black hover:shadow-sm transition-all">
            <div class="w-10 h-10 bg-black rounded-lg flex items-center justify-center flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                             M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2
                             m-6 9l2 2 4-4"/>
                </svg>
            </div>
            <div>
                <p class="font-semibold text-sm">Suivi de tâches</p>
                <p class="text-xs text-gray-400">Dictez, extrayez, priorisez.</p>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-300 ml-auto"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
        </a>

        <!-- Module : Suivi du temps (V2 — désactivé) -->
        <div class="flex items-center gap-4 p-4 bg-white rounded-xl border border-gray-100 opacity-40 cursor-not-allowed">
            <div class="w-10 h-10 bg-gray-200 rounded-lg flex items-center justify-center flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-500" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div>
                <p class="font-semibold text-sm">Suivi du temps</p>
                <p class="text-xs text-gray-400">Bientôt disponible.</p>
            </div>
            <span class="ml-auto text-xs text-gray-300 border border-gray-200 rounded px-2 py-0.5">V2</span>
        </div>
    </div>
</div>
{% endblock %}

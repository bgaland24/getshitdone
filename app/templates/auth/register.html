{% extends "base.html" %}
{% block title %}Créer un compte — GetShitDone{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="text-center">
        <h1 class="text-2xl font-bold">Créer un compte</h1>
        <p class="text-gray-500 text-sm mt-1">Un email de vérification vous sera envoyé.</p>
    </div>

    <form method="POST" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium mb-1">Email</label>
            <input type="email" id="email" name="email" required autofocus
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-black">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium mb-1">Mot de passe</label>
            <input type="password" id="password" name="password" required minlength="8"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-black">
            <p class="text-xs text-gray-400 mt-1">Minimum 8 caractères.</p>
        </div>

        <div>
            <label for="password_confirm" class="block text-sm font-medium mb-1">Confirmer le mot de passe</label>
            <input type="password" id="password_confirm" name="password_confirm" required
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-black">
        </div>

        <button type="submit"
                class="w-full bg-black text-white rounded-lg py-2 text-sm font-medium
                       hover:bg-gray-800 transition-colors">
            Créer mon compte
        </button>
    </form>

    <p class="text-center text-sm text-gray-500">
        Déjà un compte ?
        <a href="{{ url_for('auth.login') }}" class="text-black font-medium hover:underline">
            Se connecter
        </a>
    </p>
</div>
{% endblock %}

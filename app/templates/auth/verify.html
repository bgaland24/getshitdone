{% extends "base.html" %}
{% block title %}Vérification email — GetShitDone{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="text-center">
        <h1 class="text-2xl font-bold">Vérifiez votre email</h1>
        <p class="text-gray-500 text-sm mt-1">
            Un code à 6 chiffres a été envoyé à
            <strong>{{ email }}</strong>.
        </p>
    </div>

    <form method="POST" class="space-y-4">
        {% if not email %}
        <div>
            <label for="email" class="block text-sm font-medium mb-1">Email</label>
            <input type="email" id="email" name="email" required
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-black">
        </div>
        {% else %}
        <input type="hidden" name="email" value="{{ email }}">
        {% endif %}

        <div>
            <label for="code" class="block text-sm font-medium mb-1">Code de vérification</label>
            <input type="text" id="code" name="code" required autofocus
                   maxlength="6" pattern="\d{6}" inputmode="numeric"
                   placeholder="000000"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-center
                          tracking-widest text-lg font-mono
                          focus:outline-none focus:ring-2 focus:ring-black">
        </div>

        <button type="submit"
                class="w-full bg-black text-white rounded-lg py-2 text-sm font-medium
                       hover:bg-gray-800 transition-colors">
            Vérifier
        </button>
    </form>

    <!-- Renvoi du code -->
    <form method="POST" action="{{ url_for('auth.resend_verification') }}" class="text-center">
        <input type="hidden" name="email" value="{{ email }}">
        <button type="submit" class="text-sm text-gray-500 hover:text-gray-900 underline">
            Renvoyer le code
        </button>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Connexion — GetShitDone{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="text-center">
        <h1 class="text-2xl font-bold">GetShitDone</h1>
        <p class="text-gray-500 text-sm mt-1">Connectez-vous à votre espace.</p>
    </div>

    <form method="POST" class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium mb-1">Email</label>
            <input type="email" id="email" name="email" required autofocus
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-black">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium mb-1">Mot de passe</label>
            <input type="password" id="password" name="password" required
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-black">
        </div>

        <button type="submit"
                class="w-full bg-black text-white rounded-lg py-2 text-sm font-medium
                       hover:bg-gray-800 transition-colors">
            Se connecter
        </button>
    </form>

    <div class="relative">
        <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-xs text-gray-400 uppercase tracking-wide">
            <span class="bg-gray-50 px-2">ou</span>
        </div>
    </div>

    <a href="{{ url_for('auth.magic_login') }}"
       class="block w-full text-center border border-gray-300 rounded-lg py-2 text-sm
              hover:bg-gray-100 transition-colors">
        Connexion par code email
    </a>

    <p class="text-center text-sm text-gray-500">
        Pas encore de compte ?
        <a href="{{ url_for('auth.register') }}" class="text-black font-medium hover:underline">
            S'inscrire
        </a>
    </p>
</div>
{% endblock %}
